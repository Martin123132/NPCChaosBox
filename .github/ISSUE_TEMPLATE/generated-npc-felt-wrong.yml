name: Generated NPC felt wrong
description: Report repetitive, unusable, confusing, or weak NPC output.
title: "[NPC output]: "
labels: ["generation", "tuning"]
body:
  - type: markdown
    attributes:
      value: |
        The generator is deterministic, so seed, mode, and chaos make output easier to reproduce.
  - type: input
    id: seed
    attributes:
      label: Seed
      placeholder: 654744225
  - type: input
    id: mode
    attributes:
      label: Mode
      placeholder: Fantasy Tavern, Village Weird, Random
  - type: input
    id: chaos
    attributes:
      label: Chaos value
      placeholder: 55
  - type: textarea
    id: npc
    attributes:
      label: Generated NPC text
      description: Paste the NPC card or the part that felt wrong.
      render: text
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: What felt wrong?
      placeholder: Too repetitive, not usable at table, unclear ask, weak reward, not funny, etc.
    validations:
      required: true
